<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy 1st Anniversary ♡</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&family=Kanit:wght@300;400&family=Orbitron:wght@600&family=Caveat:wght@700&display=swap" rel="stylesheet">

<style>
:root {
--primary:#ff8fa3;
--secondary:#ffcad4;
--bg:#fff5f7;
--text:#7a5c61;
}

body,html{
margin:0;padding:0;
font-family:'Prompt',sans-serif;
background-color:var(--bg);
background-image:radial-gradient(#ffcad4 0.5px,transparent 0.5px);
background-size:20px 20px;
color:var(--text);
scroll-behavior:smooth;
overflow-x:hidden;
}

/* LOGIN */
#login-page{
position:fixed;top:0;left:0;width:100%;height:100%;
background:var(--bg);z-index:9999;
display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.shake{animation:shake 0.4s;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-10px);}75%{transform:translateX(10px);}}
.pass-dots{display:flex;gap:15px;margin-bottom:20px;}
.dot{width:15px;height:15px;border:2px solid var(--primary);border-radius:50%;transition:0.2s;}
.dot.active{background:var(--primary);transform:scale(1.2);box-shadow:0 0 10px var(--primary);}
#error-msg{height:20px;color:var(--primary);font-size:0.8rem;margin-bottom:20px;}
.keypad{display:grid;grid-template-columns:repeat(3,80px);gap:15px;}
.key{
width:80px;height:80px;background:white;border-radius:50%;
display:flex;align-items:center;justify-content:center;
font-size:24px;cursor:pointer;box-shadow:0 4px 10px rgba(0,0,0,0.05);
transition:0.1s;-webkit-tap-highlight-color:transparent;
}
.key:active{transform:scale(0.9);background:var(--secondary);}

/* MAIN */
#main-app{display:none;padding-bottom:120px;}
section{min-height:100vh;padding:40px 20px;box-sizing:border-box;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;}

/* POLAROID */
.polaroid{
position:relative;
z-index:5;
background:white;
padding:14px 14px 50px 14px;
border-radius:6px;
box-shadow:0 15px 40px rgba(255,143,163,0.25),0 8px 15px rgba(0,0,0,0.08);
max-width:260px;
transform:rotate(-2deg);
}
.polaroid img{width:100%;border-radius:4px;}
.polaroid-text{
font-family:'Kanit',sans-serif;
font-size:1.1rem;
color:#555;
margin-top:18px;
font-weight:300;
}

/* MODAL สดใส */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:linear-gradient(135deg,#fff0f5,#ffe4ec,#fff5f7);
z-index:10000;
align-items:center;
justify-content:center;
overflow:hidden;
}
.modal-content{width:90%;text-align:center;position:relative;}

/* ชั้นอิโมจิ */
.emoji-bg{
position:absolute;
bottom:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:1;
}
.emoji-fly{
position:absolute;
font-size:22px;
animation:flyUp 3s linear forwards;
opacity:0.9;
}
@keyframes flyUp{
0%{transform:translateY(0) scale(1);opacity:1;}
100%{transform:translateY(-300px) scale(1.4);opacity:0;}
}

/* GIFT วางมั่วแบบบาลานซ์ */
.boxes-grid{
position:relative;
width:100%;
max-width:350px;
height:320px;
margin:0 auto;
}
.gift-box{
position:absolute;
font-size:70px;
cursor:pointer;
transition:0.3s;
}
.gift-box:nth-child(1){top:10%;left:15%;}
.gift-box:nth-child(2){top:5%;right:18%;}
.gift-box:nth-child(3){top:45%;left:40%;}
.gift-box:nth-child(4){bottom:15%;left:20%;}
.gift-box:nth-child(5){bottom:10%;right:20%;}

.box-shake{animation:box-shake 0.8s ease-in-out;}
@keyframes box-shake{
0%,100%{transform:rotate(0);}
20%{transform:rotate(15deg);}
40%{transform:rotate(-15deg);}
60%{transform:rotate(10deg);}
80%{transform:rotate(-10deg);}
}

.btn-close{
background:var(--primary);
color:white;
border:none;
padding:12px 35px;
border-radius:25px;
cursor:pointer;
font-family:'Prompt',sans-serif;
margin-top:30px;
box-shadow:0 5px 15px rgba(255,143,163,0.4);
}
</style>
</head>

<body>

<!-- ส่วนอื่นเหมือนเดิมทุกอย่าง -->

<div id="modal" class="modal">
<div class="modal-content" id="modal-box">

<div class="emoji-bg" id="emoji-bg"></div>

<div id="photo-area">
<div class="polaroid">
<img id="modal-img" src="">
<div id="img-caption" class="polaroid-text"></div>
</div>
</div>

<div id="coupon-area" style="display:none;">
<div class="ticket">
<div class="ticket-header">LOVE COUPON</div>
<div class="ticket-content">
<div style="font-size:0.7rem;color:#999;">คูปองนี้มอบให้...</div>
<div id="coupon-text" class="ticket-prize"></div>
<div style="font-size:0.7rem;color:#999;margin-top:5px;">แด่คนสำคัญของหัวใจ</div>
</div>
<div class="ticket-footer">* แคปหน้าจอเพื่อใช้สิทธิ์ได้ตลอดเวลา *</div>
</div>
</div>

<button class="btn-close" onclick="closeModal()">ปิดหน้าต่าง ♡</button>
</div>
</div>

<script>
function createEmojiEffect(){
const emojis=['❤️','💖','✨','🌸','🥰'];
const bg=document.getElementById('emoji-bg');
bg.innerHTML='';
for(let i=0;i<20;i++){
setTimeout(()=>{
const emoji=document.createElement('div');
emoji.className='emoji-fly';
emoji.innerText=emojis[Math.floor(Math.random()*emojis.length)];
emoji.style.left=Math.random()*100+'%';
emoji.style.bottom='0px';
bg.appendChild(emoji);
setTimeout(()=>emoji.remove(),3000);
},i*120);
}
}
</script>

</body>
</html>
