<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Love Journey ♡</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&family=Caveat:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff8fa3;
            --secondary: #ffcad4;
            --bg: #fff5f7;
            --text: #7a5c61;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(#ffcad4 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            color: var(--text);
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        /* --- Login Page --- */
        #login-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .pass-dots { display: flex; gap: 15px; margin-bottom: 30px; }
        .dot { width: 15px; height: 15px; border: 2px solid var(--primary); border-radius: 50%; transition: 0.3s; }
        .dot.active { background: var(--primary); transform: scale(1.2); box-shadow: 0 0 10px var(--primary); }
        .keypad { display: grid; grid-template-columns: repeat(3, 80px); gap: 15px; }
        .key { 
            width: 80px; height: 80px; background: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: 0.2s;
        }
        .key:active { transform: scale(0.9); background: var(--secondary); }

        /* --- Main Content --- */
        #main-app { display: none; padding-bottom: 120px; }
        section { min-height: 100vh; padding: 40px 20px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }

        /* Timer Heart Section (NEW DESIGN) */
        .heart-timer-container {
            width: 320px; height: 300px;
            background: white;
            position: relative;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            clip-path: path('M160,280 C160,280 10,210 10,120 C10,60 70,30 110,30 C135,30 150,50 160,65 C170,50 185,30 210,30 C250,30 310,60 310,120 C310,210 160,280 160,280 Z');
            box-shadow: 0 10px 30px rgba(255,143,163,0.3);
            border: 4px solid white;
        }
        .heart-bg-shadow {
            filter: drop-shadow(0 15px 15px rgba(255,143,163,0.4));
            margin-bottom: 20px;
        }
        .time-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 15px; width: 80%; }
        .time-box { text-align: center; }
        .time-val { font-size: 1.1rem; font-weight: 600; color: var(--primary); display: block; }
        .time-lab { font-size: 0.6rem; opacity: 0.8; }
        .deco-heart { position: absolute; font-size: 24px; animation: float 4s infinite ease-in-out; opacity: 0.6; }
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(0); } 50% { transform: translateY(-20px) rotate(15deg); } }

        /* Photo Grid */
        .number-one-grid { display: grid; grid-template-columns: repeat(3, 95px); grid-template-rows: repeat(5, 95px); gap: 12px; margin-top: 30px; }
        .img-item { width: 100%; height: 100%; object-fit: cover; border-radius: 15px; border: 4px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); cursor: pointer; transition: 0.3s; }
        .p1 { grid-column: 2; grid-row: 1; } .p2 { grid-column: 2; grid-row: 2; } .p3 { grid-column: 2; grid-row: 3; } .p4 { grid-column: 2; grid-row: 4; } .p5 { grid-column: 1; grid-row: 5; } .p6 { grid-column: 2; grid-row: 5; } .p7 { grid-column: 3; grid-row: 5; } .p8 { grid-column: 1; grid-row: 2; transform: rotate(-10deg); }

        /* Envelope Section (Fixed Jumping Issue) */
        .envelope-container { position: relative; height: 380px; display: flex; align-items: center; justify-content: center; width: 100%; }
        .envelope { width: 220px; height: 140px; background: #ffc1cc; border-radius: 0 0 10px 10px; position: relative; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.1); z-index: 10; margin-top: 100px; }
        .envelope::before { content: ''; position: absolute; top: -90px; left: 0; border-left: 110px solid transparent; border-right: 110px solid transparent; border-bottom: 90px solid #ff8fa3; transition: 0.5s; z-index: 12; transform-origin: bottom; }
        .envelope.open::before { transform: rotateX(180deg); z-index: 1; }
        .paper { position: absolute; top: 10px; left: 10px; width: 200px; height: 120px; background: white; border-radius: 5px; transition: 0.7s; z-index: 5; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        /* Adjusted the TranslateY to not hit the top */
        .envelope.open .paper { transform: translateY(-130px); height: 260px; z-index: 15; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        /* Gift Boxes (5 Boxes Only) */
        .boxes-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; max-width: 320px; width: 100%; }
        .boxes-grid div:nth-child(5) { grid-column: span 2; justify-self: center; }
        .gift-box { font-size: 75px; cursor: pointer; text-align: center; filter: drop-shadow(0 8px 15px rgba(255,143,163,0.3)); transition: 0.3s; }
        .gift-box:hover { transform: scale(1.1) rotate(5deg); }

        /* Navigation */
        nav { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); padding: 10px 25px; border-radius: 40px; display: flex; gap: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 1000; border: 2px solid #fff; }
        nav a { text-decoration: none; font-size: 24px; filter: grayscale(0.5); transition: 0.3s; }
        nav a:hover { filter: grayscale(0); transform: scale(1.2); }

        /* Modal - Smaller Image */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index: 10000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { width: 75%; max-width: 300px; background: white; border-radius: 20px; padding: 20px; text-align: center; }
        #modal-img { width: 90%; border-radius: 10px; margin-bottom: 15px; }
        .btn-close { margin-top: 10px; background: var(--primary); color: white; border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-family: 'Prompt'; }
    </style>
</head>
<body>

    <div id="login-page">
        <div style="font-size: 40px; margin-bottom: 15px;">🔒</div>
        <h3 style="font-weight: 300; color: var(--primary);">Unlock Our Love ♡</h3>
        <div class="pass-dots" id="pass-dots">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <div class="keypad">
            <div class="key" onclick="addNum('1')">1</div><div class="key" onclick="addNum('2')">2</div><div class="key" onclick="addNum('3')">3</div>
            <div class="key" onclick="addNum('4')">4</div><div class="key" onclick="addNum('5')">5</div><div class="key" onclick="addNum('6')">6</div>
            <div class="key" onclick="addNum('7')">7</div><div class="key" onclick="addNum('8')">8</div><div class="key" onclick="addNum('9')">9</div>
            <div style="width:80px"></div><div class="key" onclick="addNum('0')">0</div><div class="key" onclick="clearPass()" style="font-size:14px; color:var(--primary);">Clear</div>
        </div>
    </div>

    <div id="main-app">
        <section id="time-sec">
            <div class="deco-heart" style="top:10%; left:10%;">💖</div>
            <div class="deco-heart" style="bottom:15%; right:10%;">🌸</div>
            
            <div class="heart-bg-shadow">
                <div class="heart-timer-container">
                    <div style="font-size: 0.8rem; color: var(--primary); margin-top: 20px;">เรารักกันมาแล้ว...</div>
                    <span id="days-count" style="font-size: 2.2rem; font-weight: 600; color: var(--primary); margin: 5px 0;">0 Days</span>
                    <div class="time-row">
                        <div class="time-box"><span class="time-val" id="y">0</span><span class="time-lab">ปี</span></div>
                        <div class="time-box"><span class="time-val" id="m">0</span><span class="time-lab">เดือน</span></div>
                        <div class="time-box"><span class="time-val" id="d">0</span><span class="time-lab">วัน</span></div>
                    </div>
                    <div class="time-row" style="margin-top: 10px;">
                        <div class="time-box"><span class="time-val" id="h">00</span><span class="time-lab">ชม.</span></div>
                        <div class="time-box"><span class="time-val" id="mn">00</span><span class="time-lab">นาที</span></div>
                        <div class="time-box"><span class="time-val" id="s">00</span><span class="time-lab">วิ</span></div>
                    </div>
                </div>
            </div>
            <p style="margin-top: 10px; font-weight: 300; font-size: 0.9rem;">My Whole Heart is Yours ❤️</p>
        </section>

        <section id="photo-sec">
            <h2 style="font-family: 'Caveat'; font-size: 2.8rem; color: var(--primary); margin:0;">Our Moments</h2>
            <div class="number-one-grid">
                <img src="photo1.jpg" class="img-item p1" onclick="zoomImg(this, 'ครั้งแรกที่เจอกัน')">
                <img src="photo2.jpg" class="img-item p2" onclick="zoomImg(this, 'รอยยิ้มที่เค้าชอบที่สุด')">
                <img src="photo3.jpg" class="img-item p3" onclick="zoomImg(this, 'ขอบคุณที่คอยอยู่ข้างกัน')">
                <img src="photo4.jpg" class="img-item p4" onclick="zoomImg(this, 'เธอคือของขวัญที่ดีที่สุด')">
                <img src="photo5.jpg" class="img-item p5" onclick="zoomImg(this, 'ไปเที่ยวด้วยกันอีกนะ')">
                <img src="photo6.jpg" class="img-item p6" onclick="zoomImg(this, 'รักเธอที่สุดเลย')">
                <img src="photo7.jpg" class="img-item p7" onclick="zoomImg(this, 'Happy Anniversary นะคะ')">
                <img src="photo8.jpg" class="img-item p8" onclick="zoomImg(this, 'ต้าวความรัก')">
            </div>
        </section>

        <section id="letter-sec">
            <h3 style="color: var(--primary); position: absolute; top: 60px;">A Letter For You ✉️</h3>
            <div class="envelope-container">
                <div class="envelope" id="env" onclick="openLetter()">
                    <div class="paper" id="paper">
                        <div id="typewriter" style="font-size: 0.85rem; line-height: 1.6; color: #555;"></div>
                    </div>
                </div>
            </div>
        </section>

        <section id="fun-sec">
            <h3 style="color: var(--primary); margin-bottom: 40px;">Choose Your Gift! 🎁</h3>
            <div class="boxes-grid">
                <div class="gift-box" onclick="pickBox(this)">🎁</div>
                <div class="gift-box" onclick="pickBox(this)">🎁</div>
                <div class="gift-box" onclick="pickBox(this)">🎁</div>
                <div class="gift-box" onclick="pickBox(this)">🎁</div>
                <div class="gift-box" onclick="pickBox(this)">🎁</div>
            </div>
            <p style="margin-top: 30px; font-size: 0.8rem; opacity: 0.7;">ลองจิ้มดูว่าได้รางวัลอะไรน้า!</p>
        </section>

        <nav>
            <a href="#time-sec">❤️</a>
            <a href="#photo-sec">🖼️</a>
            <a href="#letter-sec">✉️</a>
            <a href="#fun-sec">🎁</a>
        </nav>
    </div>

    <div id="modal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <img id="modal-img" src="" style="display: none;">
            <h3 id="modal-title" style="color: var(--primary); margin: 5px 0; font-size: 1.1rem;"></h3>
            <p id="modal-body" style="font-size: 0.85rem;"></p>
            <button class="btn-close" onclick="closeModal()">ปิดหน้าต่าง</button>
        </div>
    </div>

    <audio id="bgm" loop><source src="song.mp3" type="audio/mpeg"></audio>

    <script>
        let pass = "";
        const target = "091262"; // รหัสของคุณ

        function addNum(n) {
            if(pass.length < 6) {
                pass += n;
                document.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('active', i < pass.length));
                if(pass.length === 6) {
                    if(pass === target) {
                        document.getElementById('bgm').play();
                        document.getElementById('login-page').style.display = 'none';
                        document.getElementById('main-app').style.display = 'block';
                        startTimer();
                    } else {
                        document.getElementById('login-page').classList.add('shake');
                        setTimeout(() => { document.getElementById('login-page').classList.remove('shake'); clearPass(); }, 400);
                    }
                }
            }
        }
        function clearPass() { pass = ""; document.querySelectorAll('.dot').forEach(d => d.classList.remove('active')); }

        function startTimer() {
            const start = new Date("2019-12-09T00:00:00"); 
            setInterval(() => {
                const now = new Date();
                const diff = now - start;
                const days = Math.floor(diff / (1000*60*60*24));
                document.getElementById('days-count').innerText = days + " Days";
                document.getElementById('y').innerText = Math.floor(days/365);
                document.getElementById('m').innerText = Math.floor((days%365)/30);
                document.getElementById('d').innerText = days % 30;
                document.getElementById('h').innerText = String(Math.floor((diff/(1000*60*60))%24)).padStart(2,'0');
                document.getElementById('mn').innerText = String(Math.floor((diff/(1000*60))%60)).padStart(2,'0');
                document.getElementById('s').innerText = String(Math.floor((diff/1000)%60)).padStart(2,'0');
            }, 1000);
        }

        function zoomImg(el, txt) {
            const modal = document.getElementById('modal');
            const img = document.getElementById('modal-img');
            img.src = el.src;
            img.style.display = 'inline-block';
            document.getElementById('modal-title').innerText = "Memory";
            document.getElementById('modal-body').innerText = txt;
            modal.style.display = 'flex';
        }

        const msg = "ถึง...เธอที่รัก ❤️\n\nแป๊บเดียวเราก็เดินทางมาด้วยกัน 1 ปีแล้วนะ ขอบคุณที่เป็นความสุขให้กันเสมอมา\n\nเค้าสัญญาว่าจะเป็นคนที่ดีขึ้นในทุกวัน และที่สำคัญ เค้าจะไม่ยุ่งเกี่ยวกับสิ่งไม่ดีตลอดชีวิต เพื่อสร้างอนาคตที่ดีไปกับเธอนะ\n\nรักเธอที่สุดเลยนะเจ้าความรัก ♡";
        let isTyped = false;
        function openLetter() {
            document.getElementById('env').classList.add('open');
            if(!isTyped) {
                isTyped = true;
                let i = 0;
                function type() {
                    if (i < msg.length) {
                        document.getElementById('typewriter').innerHTML += msg.charAt(i) === '\n' ? '<br>' : msg.charAt(i);
                        i++; setTimeout(type, 50);
                    }
                }
                setTimeout(type, 1000);
            }
        }

        const prizes = ["คูปองตามใจ 1 วัน ✨", "คูปองบุฟเฟต์ฟรี 1 มื้อ 🥩", "คูปองหอมแจ้ม 10 ที 😘", "คูปองยกโทษให้ 1 ครั้ง 🥺", "คูปองนวดไหล่ 30 นาที 💆‍♂️"];
        function pickBox(el) {
            el.animate([{transform:'rotate(0)'}, {transform:'rotate(15deg)'}, {transform:'rotate(-15deg)'}, {transform:'rotate(0)'}], {duration:100, iterations:8});
            setTimeout(() => {
                const prize = prizes[Math.floor(Math.random()*prizes.length)];
                document.getElementById('modal-img').style.display = 'none';
                document.getElementById('modal-title').innerText = "Surprise! 🎉";
                document.getElementById('modal-body').innerText = "คุณได้รับ: " + prize;
                document.getElementById('modal').style.display = 'flex';
                el.innerText = "✨";
            }, 800);
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
    </script>
</body>
</html>
