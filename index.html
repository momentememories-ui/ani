<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy 1st Anniversary ♡</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&family=Caveat:wght@700&family=Orbitron:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff8fa3;
            --secondary: #ffcad4;
            --bg: #fff5f7;
            --text: #7a5c61;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(#ffcad4 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            color: var(--text);
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        /* --- Login Page --- */
        #login-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .pass-dots { display: flex; gap: 15px; margin-bottom: 30px; }
        .dot { width: 15px; height: 15px; border: 2px solid var(--primary); border-radius: 50%; transition: 0.3s; }
        .dot.active { background: var(--primary); transform: scale(1.2); box-shadow: 0 0 10px var(--primary); }
        .keypad { display: grid; grid-template-columns: repeat(3, 80px); gap: 15px; }
        .key { 
            width: 80px; height: 80px; background: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: 0.2s; -webkit-tap-highlight-color: transparent;
        }
        .key:active { transform: scale(0.9); background: var(--secondary); }

        /* --- Main Content --- */
        #main-app { display: none; padding-bottom: 120px; }
        section { min-height: 100vh; padding: 60px 20px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }

        /* Digital Clock NEW Design */
        .clock-container {
            background: #fff; padding: 15px 25px; border-radius: 50px;
            box-shadow: 0 10px 25px rgba(255, 143, 163, 0.2);
            border: 4px solid var(--secondary); display: flex; gap: 10px; align-items: center; margin: 20px 0;
        }
        .clock-unit { text-align: center; }
        .clock-val { 
            font-family: 'Orbitron', sans-serif; font-size: 1.8rem; color: var(--primary); 
            background: #fff0f3; padding: 5px 10px; border-radius: 10px; min-width: 45px; display: inline-block;
        }
        .clock-sep { font-size: 1.5rem; color: var(--secondary); animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* Calendar Style */
        .calendar-wrap { display: flex; gap: 10px; margin-bottom: 10px; }
        .calendar-card {
            background: white; width: 90px; height: 110px; border-radius: 15px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid #eee;
        }
        .cal-top { background: var(--primary); height: 28px; color: white; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 600; }
        .cal-num { font-size: 1.5rem; font-weight: 600; color: var(--text); padding-top: 15px; display: block; text-align: center; }
        .cal-unit { font-size: 0.6rem; color: #bbb; display: block; text-align: center; }

        /* Photo Grid */
        .number-one-grid { display: grid; grid-template-columns: repeat(3, 95px); grid-template-rows: repeat(5, 95px); gap: 12px; margin-top: 30px; }
        .img-item { width: 100%; height: 100%; object-fit: cover; border-radius: 15px; border: 4px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); cursor: pointer; transition: 0.3s; }
        .p1 { grid-column: 2; grid-row: 1; } .p2 { grid-column: 2; grid-row: 2; } .p3 { grid-column: 2; grid-row: 3; } .p4 { grid-column: 2; grid-row: 4; } .p5 { grid-column: 1; grid-row: 5; } .p6 { grid-column: 2; grid-row: 5; } .p7 { grid-column: 3; grid-row: 5; } .p8 { grid-column: 1; grid-row: 2; transform: rotate(-10deg); }

        /* Envelope */
        .envelope-container { position: relative; height: 350px; display: flex; align-items: center; justify-content: center; width: 100%; }
        .envelope { width: 220px; height: 140px; background: #ffc1cc; border-radius: 0 0 10px 10px; position: relative; cursor: pointer; z-index: 10; margin-top: 100px; }
        .envelope::before { content: ''; position: absolute; top: -90px; left: 0; border-left: 110px solid transparent; border-right: 110px solid transparent; border-bottom: 90px solid #ff8fa3; transition: 0.5s; z-index: 12; transform-origin: bottom; }
        .envelope.open::before { transform: rotateX(180deg); z-index: 1; }
        .paper { position: absolute; top: 10px; left: 10px; width: 200px; height: 120px; background: white; border-radius: 5px; transition: 0.7s; z-index: 5; padding: 25px; box-sizing: border-box; overflow-y: auto; }
        .envelope.open .paper { transform: translateY(-160px); height: 280px; width: 260px; left: -20px; z-index: 15; box-shadow: 0 15px 30px rgba(0,0,0,0.1); }

        /* Boxes */
        .boxes-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; }
        .boxes-grid div:nth-child(5) { grid-column: span 2; justify-self: center; }
        .gift-box { font-size: 75px; cursor: pointer; transition: 0.3s; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1)); }

        /* Navigation */
        nav { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); padding: 10px 25px; border-radius: 40px; display: flex; gap: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 1000; border: 2px solid #fff; }
        nav a { text-decoration: none; font-size: 24px; }

        /* Modal - Refined for Photos */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(255, 192, 203, 0.4); backdrop-filter: blur(8px); z-index: 10000; align-items: center; justify-content: center; }
        .modal-content { width: 85%; max-width: 300px; background: white; border-radius: 25px; padding: 15px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        #modal-img { width: 100%; max-height: 350px; object-fit: contain; border-radius: 15px; }

        .coupon {
            background: #fff; border: 2px dashed var(--primary); padding: 20px; border-radius: 15px; margin-top: 10px;
        }
        .btn-close { margin-top: 15px; background: var(--primary); color: white; border: none; padding: 8px 25px; border-radius: 20px; cursor: pointer; font-family: 'Prompt'; }
    </style>
</head>
<body>

    <div id="login-page">
        <h3 style="font-weight: 300; color: var(--primary); margin-bottom: 30px;">Enter Password ♡</h3>
        <div class="pass-dots" id="pass-dots">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <div class="keypad">
            <div class="key" onclick="addNum('1')">1</div><div class="key" onclick="addNum('2')">2</div><div class="key" onclick="addNum('3')">3</div>
            <div class="key" onclick="addNum('4')">4</div><div class="key" onclick="addNum('5')">5</div><div class="key" onclick="addNum('6')">6</div>
            <div class="key" onclick="addNum('7')">7</div><div class="key" onclick="addNum('8')">8</div><div class="key" onclick="addNum('9')">9</div>
            <div style="width:80px"></div><div class="key" onclick="addNum('0')">0</div><div class="key" onclick="clearPass()" style="font-size:14px; color:var(--primary);">Del</div>
        </div>
    </div>

    <div id="main-app">
        <section id="time-sec">
            <div style="font-size: 1rem; color: var(--primary); margin-bottom: 20px;">เรารักกันมานานแค่ไหนแล้วนะ...</div>
            
            <div class="calendar-wrap">
                <div class="calendar-card"><span class="cal-top">YEARS</span><span class="cal-num" id="y">0</span><span class="cal-unit">ปี</span></div>
                <div class="calendar-card"><span class="cal-top">MONTHS</span><span class="cal-num" id="m">0</span><span class="cal-unit">เดือน</span></div>
                <div class="calendar-card"><span class="cal-top">DAYS</span><span class="cal-num" id="d">0</span><span class="cal-unit">วัน</span></div>
            </div>

            <div class="clock-container">
                <div class="clock-unit"><span class="clock-val" id="ch">00</span></div>
                <div class="clock-sep">:</div>
                <div class="clock-unit"><span class="clock-val" id="cm">00</span></div>
                <div class="clock-sep">:</div>
                <div class="clock-unit"><span class="clock-val" id="cs">00</span></div>
            </div>
            <p style="font-size: 0.8rem; opacity: 0.6;">Every second counts with you ❤️</p>
        </section>

        <section id="photo-sec">
            <h2 style="font-family: 'Caveat'; font-size: 2.5rem; color: var(--primary); margin:0; text-align: center;">Happy First Anniversary</h2>
            <div class="number-one-grid">
                <img src="photo1.jpg" class="img-item p1" onclick="zoomImg(this)">
                <img src="photo2.jpg" class="img-item p2" onclick="zoomImg(this)">
                <img src="photo3.jpg" class="img-item p3" onclick="zoomImg(this)">
                <img src="photo4.jpg" class="img-item p4" onclick="zoomImg(this)">
                <img src="photo5.jpg" class="img-item p5" onclick="zoomImg(this)">
                <img src="photo6.jpg" class="img-item p6" onclick="zoomImg(this)">
                <img src="photo7.jpg" class="img-item p7" onclick="zoomImg(this)">
                <img src="photo8.jpg" class="img-item p8" onclick="zoomImg(this)">
            </div>
        </section>

        <section id="letter-sec">
            <div class="envelope-container">
                <div class="envelope" id="env" onclick="openLetter()">
                    <div class="paper" id="paper">
                        <div id="typewriter" style="font-size: 0.85rem; line-height: 1.8; color: #555;"></div>
                    </div>
                </div>
            </div>
        </section>

        <section id="fun-sec">
            <h3 style="color: var(--primary); margin-bottom: 40px;">Choose Your Gift! 🎁</h3>
            <div class="boxes-grid">
                <div class="gift-box" onclick="pickBox(this)">🎁</div>
                <div class="gift-box" onclick="pickBox(this)">🎁</div>
                <div class="gift-box" onclick="pickBox(this)">🎁</div>
                <div class="gift-box" onclick="pickBox(this)">🎁</div>
                <div class="gift-box" onclick="pickBox(this)">🎁</div>
            </div>
        </section>

        <nav>
            <a href="#time-sec">⏰</a>
            <a href="#photo-sec">🖼️</a>
            <a href="#letter-sec">✉️</a>
            <a href="#fun-sec">🎁</a>
        </nav>
    </div>

    <div id="modal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <img id="modal-img" src="" style="display: none;">
            <div id="coupon-area" style="display: none;">
                <div class="coupon">
                    <div style="font-size: 0.7rem; color: #aaa;">LOVE COUPON</div>
                    <div id="coupon-text" style="font-size: 1.2rem; font-weight: 600; color: var(--primary); margin: 10px 0;"></div>
                    <div style="font-size: 0.6rem; color: #ccc;">*แคปหน้าจอเพื่อใช้สิทธิ์*</div>
                </div>
            </div>
            <button class="btn-close" onclick="closeModal()">ปิด</button>
        </div>
    </div>

    <audio id="bgm" loop><source src="song.mp3" type="audio/mpeg"></audio>
    <audio id="click-sound"><source src="https://www.soundjay.com/buttons/button-16.mp3" type="audio/mpeg"></audio>

    <script>
        let pass = "";
        const target = "091262";

        function addNum(n) {
            document.getElementById('click-sound').currentTime = 0;
            document.getElementById('click-sound').play();
            if(pass.length < 6) {
                pass += n;
                document.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('active', i < pass.length));
                if(pass.length === 6) {
                    if(pass === target) {
                        document.getElementById('bgm').play().catch(() => {});
                        document.getElementById('login-page').style.display = 'none';
                        document.getElementById('main-app').style.display = 'block';
                        startTimer();
                    } else {
                        document.getElementById('login-page').classList.add('shake');
                        setTimeout(() => { document.getElementById('login-page').classList.remove('shake'); clearPass(); }, 400);
                    }
                }
            }
        }
        function clearPass() { pass = ""; document.querySelectorAll('.dot').forEach(d => d.classList.remove('active')); }

        function startTimer() {
            const start = new Date("2019-12-09T00:00:00"); 
            setInterval(() => {
                const now = new Date();
                const diff = now - start;
                const daysTotal = Math.floor(diff / (1000*60*60*24));
                document.getElementById('y').innerText = Math.floor(daysTotal/365);
                document.getElementById('m').innerText = Math.floor((daysTotal%365)/30);
                document.getElementById('d').innerText = daysTotal % 30;
                document.getElementById('ch').innerText = String(Math.floor((diff/(1000*60*60))%24)).padStart(2,'0');
                document.getElementById('cm').innerText = String(Math.floor((diff/(1000*60))%60)).padStart(2,'0');
                document.getElementById('cs').innerText = String(Math.floor((diff/1000)%60)).padStart(2,'0');
            }, 1000);
        }

        function zoomImg(el) {
            const modal = document.getElementById('modal');
            const img = document.getElementById('modal-img');
            img.src = el.src;
            img.style.display = 'inline-block';
            document.getElementById('coupon-area').style.display = 'none';
            modal.style.display = 'flex';
        }

        const msg = "ถึง...เธอที่รักที่สุด ❤️\n\nสุขสันต์วันครบรอบ 1 ปีนะ ขอบคุณที่อยู่เคียงข้างกัน และทำให้ทุกวันมีความหมาย\n\nเค้าสัญญาว่าจะเป็นคนที่ดีขึ้นในทุกวัน และที่สำคัญ เค้าจะไม่ยุ่งเกี่ยวกับสิ่งไม่ดีตลอดชีวิต เพื่ออนาคตที่สดใสของเรานะ\n\nรักเธอที่สุดเลยเจ้าความรัก ♡";
        let isTyped = false;
        function openLetter() {
            document.getElementById('env').classList.add('open');
            if(!isTyped) {
                isTyped = true;
                let i = 0;
                function type() {
                    if (i < msg.length) {
                        document.getElementById('typewriter').innerHTML += msg.charAt(i) === '\n' ? '<br>' : msg.charAt(i);
                        i++; setTimeout(type, 50);
                    }
                }
                setTimeout(type, 1000);
            }
        }

        const prizes = ["คูปองตามใจ 1 วัน ✨", "คูปองบุฟเฟต์ฟรี 1 มื้อ 🥩", "คูปองหอมแจ้ม 10 ที 😘", "คูปองยกโทษให้ 1 ครั้ง 🥺", "คูปองนวดไหล่ 30 นาที 💆‍♂️"];
        function pickBox(el) {
            el.animate([{transform:'scale(1)'}, {transform:'scale(1.2) rotate(10deg)'}, {transform:'scale(1)'}], {duration:300, iterations:3});
            setTimeout(() => {
                const prize = prizes[Math.floor(Math.random()*prizes.length)];
                document.getElementById('modal-img').style.display = 'none';
                document.getElementById('coupon-area').style.display = 'block';
                document.getElementById('coupon-text').innerText = prize;
                document.getElementById('modal').style.display = 'flex';
                el.innerText = "✨";
            }, 1000);
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
    </script>
</body>
</html>
